name: Daily Denali Weather Call

# on:
  # # Runs in the morning and evening AKDT
  # schedule:
  #   - cron: "30 10 * * *"
  #   - cron: "30 23 * * *"

  # # Allow manual runs from the Actions tab
  # workflow_dispatch:

jobs:
  trigger-weather-call:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Denali weather call
        env:
          PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
        run: |
          curl -s -X POST "$PUBLIC_BASE_URL/trigger-call" \
            -H "Content-Type: application/json" \
            --fail \
            | jq .
