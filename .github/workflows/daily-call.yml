name: Daily Denali Weather Call

on:
  # Runs at 7:30 AM & 7:30 PM Alaska Standard Time (AKST, UTC-9)
  schedule:
    - cron: "30 4 * * *"   # 7:30 PM AKST
    - cron: "30 15 * * *"  # 7:30 AM AKST

  # Allow manual runs from the Actions tab
  workflow_dispatch:

jobs:
  trigger-weather-call:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Denali weather call
        env:
          PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
        run: |
          curl -s -X POST "$PUBLIC_BASE_URL/trigger-call" \
            -H "Content-Type: application/json" \
            --fail \
            | jq .
