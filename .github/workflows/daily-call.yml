name: Daily Denali Weather Call

on:
  # Runs at 4:30 AM & 4:30 PM AKDT
  schedule:
    - cron: "30 12 * * *"   # 4:30 AM AKDT (UTC-8)
    - cron: "30 0 * * *"    # 4:30 PM AKDT (UTC-8)

  # Allow manual runs from the Actions tab
  workflow_dispatch:

jobs:
  trigger-weather-call:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Denali weather call
        env:
          PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
        run: |
          curl -s -X POST "$PUBLIC_BASE_URL/trigger-call" \
            -H "Content-Type: application/json" \
            --fail \
            | jq .
